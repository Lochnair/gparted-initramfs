name: Build Rescue Initramfs

on:
  schedule:
    # Runs at 02:00 every Sunday
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write # Required for the release action to upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Extract apk-tools-static
        run: |
          BASE_URL="https://dl-cdn.alpinelinux.org/alpine/latest-stable/main/x86_64"
          
          # Parse the APKINDEX directly in memory to find the exact latest version
          APK_VERSION=$(wget -qO- "$BASE_URL/APKINDEX.tar.gz" | tar -Ozx APKINDEX | grep -A 1 '^P:apk-tools-static$' | grep '^V:' | cut -d ':' -f 2)
          
          echo "Found apk-tools-static version: $APK_VERSION"
          
          # Download and extract just the static binary
          wget -q "$BASE_URL/apk-tools-static-${APK_VERSION}.apk"
          tar -xzf "apk-tools-static-${APK_VERSION}.apk" sbin/apk.static

      - name: Build RootFS and Initramfs
        run: |
          mkdir rootfs
          
          # 1. Bootstrap the system using the static binary
          # We use --allow-untrusted because the Ubuntu runner doesn't have Alpine's signing keys yet
          echo "Installing packages..."
          sudo ./sbin/apk.static --root rootfs --initdb --update-cache \
            -X http://dl-cdn.alpinelinux.org/alpine/latest-stable/main \
            -X http://dl-cdn.alpinelinux.org/alpine/latest-stable/community \
            --allow-untrusted add \
            alpine-base linux-lts openrc eudev \
            labwc gparted mesa-dri-gallium wayland xwayland \
            font-terminus adwaita-icon-theme

          # 2. Configure the boot process
          echo "Configuring boot sequence..."
          sudo sed -i 's/^tty1::respawn:\/sbin\/getty 38400 tty1/tty1::respawn:\/sbin\/start-gui/' rootfs/etc/inittab
          
          # Write the launcher script (using 'EOF' prevents variable expansion during creation)
          sudo bash -c "cat << 'EOF' > rootfs/sbin/start-gui
          #!/bin/sh
          . /etc/profile
          
          export XDG_RUNTIME_DIR=/tmp/xdg-runtime-root
          mkdir -p \$XDG_RUNTIME_DIR
          chmod 0700 \$XDG_RUNTIME_DIR
          
          clear
          echo '======================================'
          echo '    System Maintenance Environment    '
          echo '======================================'
          echo ''
          read -p 'Enter keyboard layout (default: us): ' KBD_INPUT
          export XKB_DEFAULT_LAYOUT=\${KBD_INPUT:-us}
          
          exec labwc
          EOF"
          
          sudo chmod +x rootfs/sbin/start-gui
          
          # Enable essential OpenRC services for hardware detection
          sudo ln -s /etc/init.d/mdev rootfs/etc/runlevels/sysinit/mdev
          sudo ln -s /etc/init.d/udev rootfs/etc/runlevels/sysinit/udev
          sudo ln -s /etc/init.d/udev-trigger rootfs/etc/runlevels/sysinit/udev-trigger

          # 3. Extract kernel and pack initramfs
          echo "Packing initramfs..."
          sudo cp rootfs/boot/vmlinuz-lts ./vmlinuz-rescue
          
          cd rootfs
          # Must use sudo for find/cpio so it can read root-owned files inside the chroot tree
          sudo find . -print0 | sudo cpio --null -ov --format=newc | gzip -9 > ../initramfs-rescue.cpio.gz
          cd ..
          
          # Fix ownership so the GitHub Action runner can read the artifacts for the release upload
          sudo chown runner:runner vmlinuz-rescue initramfs-rescue.cpio.gz

      - name: Generate Release Tag
        id: tag
        run: echo "RELEASE_TAG=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Rescue Environment ${{ env.RELEASE_TAG }}"
          body: "Automated weekly build of the Alpine Wayland/GParted rescue environment."
          files: |
            initramfs-rescue.cpio.gz
            vmlinuz-rescue
